name: Generate Snake

on:
  # Regenerate twice a day so the snake stays current
  schedule:
    - cron: "0 */12 * * *"
  # Let you (or Claude) trigger it manually from the Actions tab / CLI
  workflow_dispatch:
  # Also regenerate whenever main changes
  push:
    branches:
      - main

# Needed so the built-in GITHUB_TOKEN can push to the `output` branch
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate the snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/github-snake-ocean.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9

      - name: Push generated files to the `output` branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
